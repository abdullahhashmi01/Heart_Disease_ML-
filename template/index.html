<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Prediction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-size: 13px;
            color: #555;
            margin-bottom: 5px;
            font-weight: 600;
        }
        input, select {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            background: #f0f4ff;
            border: 2px solid #667eea;
            color: #333;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>❤️ Heart Disease Predictor</h1>
    <p class="subtitle">Enter patient details to predict heart disease risk</p>

    <form action="/predict" method="post">
        <div class="form-grid">
            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" placeholder="e.g. 45" required>
            </div>
            <div class="form-group">
                <label>Sex (0=Female, 1=Male)</label>
                <select name="sex">
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>
            <div class="form-group">
                <label>Chest Pain Type (0-3)</label>
                <select name="cp">
                    <option value="0">Type 0</option>
                    <option value="1">Type 1</option>
                    <option value="2">Type 2</option>
                    <option value="3">Type 3</option>
                </select>
            </div>
            <div class="form-group">
                <label>Resting BP (trestbps)</label>
                <input type="number" name="trestbps" placeholder="e.g. 120" required>
            </div>
            <div class="form-group">
                <label>Cholesterol (chol)</label>
                <input type="number" name="chol" placeholder="e.g. 200" required>
            </div>
            <div class="form-group">
                <label>Fasting Blood Sugar (fbs)</label>
                <select name="fbs">
                    <option value="0">≤ 120 mg/dl</option>
                    <option value="1">> 120 mg/dl</option>
                </select>
            </div>
            <div class="form-group">
                <label>Rest ECG (0-2)</label>
                <select name="restecg">
                    <option value="0">Normal</option>
                    <option value="1">ST-T Abnormality</option>
                    <option value="2">LV Hypertrophy</option>
                </select>
            </div>
            <div class="form-group">
                <label>Max Heart Rate (thalach)</label>
                <input type="number" name="thalach" placeholder="e.g. 150" required>
            </div>
            <div class="form-group">
                <label>Exercise Angina (exang)</label>
                <select name="exang">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>
            <div class="form-group">
                <label>Oldpeak (ST Depression)</label>
                <input type="number" step="0.1" name="oldpeak" placeholder="e.g. 1.5" required>
            </div>
            <div class="form-group">
                <label>Slope (0-2)</label>
                <select name="slope">
                    <option value="0">Upsloping</option>
                    <option value="1">Flat</option>
                    <option value="2">Downsloping</option>
                </select>
            </div>
            <div class="form-group">
                <label>CA (Major Vessels 0-3)</label>
                <select name="ca">
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>Thal (0-3)</label>
                <select name="thal">
                    <option value="0">Normal</option>
                    <option value="1">Fixed Defect</option>
                    <option value="2">Reversible Defect</option>
                    <option value="3">Type 3</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn">🔍 Predict Now</button>
    </form>

    {% if result %}
    <div class="result">{{ result }}</div>
    {% endif %}
</div>
</body>
</html>
